components:
  schemas:
    SelectItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        label:
          type: string
      required: [id, name]
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, name, email]
    Eyepiece:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        focal_length:
          type: number
          nullable: true
        type:
          type: string
      required: [id, name]
    Instrument:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        make:
          type: string
        type:
          type: string
      required: [id, name]
    Lens:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        make:
          type: string
      required: [id, name]
    Location:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        lat:
          type: number
          nullable: true
        lon:
          type: number
          nullable: true
      required: [id, name]
    Filter:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
      required: [id, name]
    LicenseItem:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
      required: [code]
